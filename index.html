<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Isabela Aoki - Website</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
 
  <!-- NAVBAR -->
  <header class="nav" id="navbar" role="banner">
    <div class="nav__inner">
 
      <!-- Logo -->
      <a href="#hero" class="nav__logo" aria-label="Go to top">isa.</a>
 
      <!-- Links centralizados (desktop) -->
      <nav class="nav__links" aria-label="Main navigation">
        <a href="#about" class="nav__link" data-section="about">About Me</a>
        <a href="#experience" class="nav__link" data-section="experience">Experience</a>
        <a href="#skills" class="nav__link" data-section="skills">Skills</a>
        <a href="#projects" class="nav__link" data-section="projects">Projects</a>
      </nav>
 
      <!-- Botão de mudar tema -->
      <div class="nav__controls">
        <button class="nav__theme-btn" id="themeToggle" aria-label="Toggle dark mode"title="Toggle dark mode">
          <span class="icon-sun" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </span>
          <span class="icon-moon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </span>
        </button>
 
        <!-- Links no formato Hamburger (somente mobile) -->
        <button class="nav__hamburger" id="menuToggle" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>
 
  <!-- MENU MOBILE -->
  <div class="mobile-menu" id="mobileMenu" aria-hidden="true" role="dialog" aria-label="Mobile navigation">
    <nav class="mobile-menu__links" aria-label="Mobile main navigation">
      <a href="#about" class="mobile-menu__link" data-section="about">About</a>
      <a href="#experience" class="mobile-menu__link" data-section="experience">Experience</a>
      <a href="#skills" class="mobile-menu__link" data-section="skills">Skills</a>
      <a href="#projects" class="mobile-menu__link" data-section="projects">Projects</a>
    </nav>
    <button class="mobile-menu__close" id="menuClose" aria-label="Close menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="mobile-menu__backdrop" id="menuBackdrop"></div>
 
  <!-- ── PLACEHOLDER SECTIONS ───────────────────────────────── -->
  <main>
    <section id="hero"       class="section section--hero">Hero</section>
    <section id="about"      class="section">About</section>
    <section id="experience" class="section">Experience</section>
    <section id="skills"     class="section">Skills</section>
    <section id="projects"   class="section">Projects</section>
  </main>
 
  <script src="assets\js\script.js"></script>
</body>
</html>
